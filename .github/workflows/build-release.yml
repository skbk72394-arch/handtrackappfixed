name: Build Release APK

on:
  release:
    types: [created, published]
  workflow_dispatch:

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'HandTrackApp/package-lock.json'
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        working-directory: HandTrackApp
        run: npm ci
      
      - name: Install Expo CLI
        run: npm install -g expo-cli
      
      - name: Run Expo prebuild
        working-directory: HandTrackApp
        run: npx expo prebuild --platform android --clean
      
      - name: Make gradlew executable
        working-directory: HandTrackApp/android
        run: chmod +x ./gradlew
      
      - name: Build Release APK
        working-directory: HandTrackApp/android
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Sign APK
        if: ${{ env.KEYSTORE_FILE != '' }}
        working-directory: HandTrackApp/android
        env:
          KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > release.keystore
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "$KEY_ALIAS"
          zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: handtrack-release-apk-${{ github.run_number }}
          path: |
            HandTrackApp/android/app/build/outputs/apk/release/app-release.apk
            HandTrackApp/android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 90
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            HandTrackApp/android/app/build/outputs/apk/release/app-release.apk
            HandTrackApp/android/app/build/outputs/apk/release/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Build Summary
        run: |
          echo "## 🎉 Release Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download APK" >> $GITHUB_STEP_SUMMARY
          echo "The APK has been uploaded to the [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) section." >> $GITHUB_STEP_SUMMARY
