name: Build Android APK

on:
  push:
    branches:
      - main
      - feature/fix-android-permissions-accessibility
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'HandTrackApp/package-lock.json'
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        working-directory: HandTrackApp
        run: npm ci
      
      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/ngrok@^4.1.0
      
      - name: Run Expo prebuild
        working-directory: HandTrackApp
        run: npx expo prebuild --platform android --clean
      
      - name: Make gradlew executable
        working-directory: HandTrackApp/android
        run: chmod +x ./gradlew
      
      - name: Build Android Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        working-directory: HandTrackApp/android
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Build Android Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: HandTrackApp/android
        run: ./gradlew assembleRelease --no-daemon
      
      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: handtrack-debug-apk
          path: HandTrackApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: handtrack-release-apk
          path: HandTrackApp/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Get APK Info
        id: apk_info
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            APK_PATH="HandTrackApp/android/app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="HandTrackApp/android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(ls -lh "$APK_PATH" | awk '{print $5}')
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment APK Info on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apkSize = '${{ steps.apk_info.outputs.apk_size }}';
            const buildType = '${{ github.event.inputs.build_type || 'debug' }}';
            
            const comment = `## 📱 Android APK Build Complete
            
            **Build Type:** ${buildType}
            **APK Size:** ${apkSize}
            
            The APK has been built successfully and uploaded as an artifact.
            
            ### Download APK
            1. Go to the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Scroll down to **Artifacts**
            3. Download **handtrack-${buildType}-apk**
            
            ### Install on Device
            \`\`\`bash
            adb install app-${buildType}.apk
            \`\`\`
            
            ✅ Ready to test!`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
